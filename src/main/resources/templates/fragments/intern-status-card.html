<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div th:fragment="internStatusCard(review, submission)"
     class="card shadow-sm mb-3"
     th:attr="data-review-id=${review.id},data-initial-status=${review.status.name()}"
     th:classappend="${review.status.name() == 'APPROVED'} ? ' border border-success border-2' : (${review.status.name() == 'REJECTED' or review.status.name() == 'ERROR'} ? ' border border-danger border-2' : ' border border-light')">
    <div class="card-body py-3">
        <h4 class="h6 card-title mb-2">Review status</h4>
        <p class="text-muted small mb-1" th:text="${review.task.taskName}">Task name</p>
        <p class="text-muted small mb-2" th:text="${review.task.course.courseName}">Course</p>
        <div th:replace="~{fragments/review-status-badge :: statusBadge(${review.status})}"></div>

        <!-- Filled on first paint when ERROR; updated by review-polling.js when status flips to ERROR. -->
        <div id="review-error-alert"
             class="alert alert-danger mt-2 mb-0 py-2 small"
             role="alert"
             aria-live="assertive"
             th:classappend="${review.status.name() == 'ERROR' and review.errorMessage != null and !review.errorMessage.isBlank()} ? '' : ' d-none'"
             th:text="${review.errorMessage != null ? review.errorMessage : ''}"></div>

        <div class="mt-2" th:if="${review.status.name() == 'REJECTED' and review.mentorRemarks != null and !review.mentorRemarks.isBlank()}">
            <h6 class="text-muted text-uppercase small mb-1">Mentor remarks</h6>
            <p class="mb-0 small" th:text="${review.mentorRemarks}">Remarks</p>
        </div>
        <div class="mt-2" th:if="${review.status.name() == 'APPROVED' and review.mentorRemarks != null and !review.mentorRemarks.isBlank()}">
            <h6 class="text-muted text-uppercase small mb-1">Mentor remarks</h6>
            <p class="mb-0 small" th:text="${review.mentorRemarks}">Remarks</p>
        </div>

        <div th:if="${review.status.name() == 'REJECTED' and review.issues != null and !review.issues.isEmpty()}" class="mt-2">
            <h6 class="text-muted text-uppercase small mb-1">AI issues</h6>
            <ul class="list-unstyled small mb-0">
                <li th:each="issue : ${review.issues}" th:text="${issue.issue}">Issue</li>
            </ul>
        </div>

        <p class="text-muted small mt-2 mb-0"
           th:if="${review.status.name() == 'PENDING' or review.status.name() == 'LLM_EVALUATED'}">
            Checking status…
        </p>

        <th:block th:if="${review.status.name() == 'ERROR' or review.status.name() == 'REJECTED'}">
            <hr class="my-2"/>
            <h6 class="text-muted text-uppercase small mb-2">Resubmit</h6>
            <form th:action="@{/intern/tasks/{id}/submit(id=${review.task.id})}"
                  th:object="${submission}" method="post" class="row g-2" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="col-md-4 col-12">
                    <label class="form-label small mb-0" for="resubmit-repo-owner">Repository Owner</label>
                    <input id="resubmit-repo-owner" class="form-control form-control-sm" type="text" th:field="*{repoOwner}" required autocomplete="off"/>
                </div>
                <div class="col-md-4 col-12">
                    <label class="form-label small mb-0" for="resubmit-repo-name">Repository Name</label>
                    <input id="resubmit-repo-name" class="form-control form-control-sm" type="text" th:field="*{repoName}" required autocomplete="off"/>
                </div>
                <div class="col-md-4 col-12">
                    <label class="form-label small mb-0" for="resubmit-pr">Pull Request Number</label>
                    <input id="resubmit-pr" class="form-control form-control-sm" type="number" min="1" th:field="*{prNumber}" required/>
                </div>
                <div class="col-12 mt-1">
                    <button type="submit" class="btn btn-primary btn-sm">Submit for AI review</button>
                </div>
            </form>
        </th:block>
    </div>
    <div class="card-footer bg-body-tertiary text-muted small py-2">
        Reference: <span th:text="${review.id}">0</span>
    </div>
</div>
</body>
</html>
