<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title th:text="${task.taskName}">Task</title></head>
<body>
<main id="main-content" layout:fragment="content">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a th:href="@{/intern/tasks}">My Tasks</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${task.taskName}">Task</li>
        </ol>
    </nav>

    <h4 th:text="${task.taskName}">Task name</h4>
    <p class="text-muted small mb-4">
        <span th:text="${task.course.courseName}">Course</span>
    </p>
    <div th:if="${submissionError != null}" class="alert alert-warning" role="alert" th:text="${submissionError}"></div>
    <div th:if="${!canSubmit and submitBlockReason != null and !#strings.isEmpty(submitBlockReason) and submissionError == null}"
         class="alert alert-info" role="alert" th:text="${submitBlockReason}"></div>
    <div class="mb-4" th:if="${task.taskDescription != null and !task.taskDescription.isEmpty()}">
        <h6 class="text-muted text-uppercase small">Description</h6>
        <p class="mb-0" th:text="${task.taskDescription}">Description</p>
    </div>

    <h5 th:if="${canSubmit}" class="mb-3">Submit pull request</h5>
    <form th:action="@{/intern/tasks/{id}/submit(id=${task.id})}"
          th:if="${canSubmit}"
          th:object="${submission}" method="post" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="row g-3">
            <div class="col-md-4 col-12">
                <label for="repoOwner" class="form-label">Repository Owner</label>
                <input id="repoOwner" class="form-control" type="text" th:field="*{repoOwner}"
                       th:classappend="${#fields.hasErrors('repoOwner')} ? ' is-invalid'" required autocomplete="off"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('repoOwner')}"
                     th:errors="*{repoOwner}">Error</div>
            </div>
            <div class="col-md-4 col-12">
                <label for="repoName" class="form-label">Repository Name</label>
                <input id="repoName" class="form-control" type="text" th:field="*{repoName}"
                       th:classappend="${#fields.hasErrors('repoName')} ? ' is-invalid'" required autocomplete="off"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('repoName')}"
                     th:errors="*{repoName}">Error</div>
            </div>
            <div class="col-md-4 col-12">
                <label for="prNumber" class="form-label">Pull Request Number</label>
                <input id="prNumber" class="form-control" type="number" min="1" th:field="*{prNumber}"
                       th:classappend="${#fields.hasErrors('prNumber')} ? ' is-invalid'" required/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('prNumber')}"
                     th:errors="*{prNumber}">Error</div>
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Submit for AI review</button>
            <a class="btn btn-outline-secondary ms-2" th:href="@{/intern/tasks}">Cancel</a>
        </div>
    </form>

    <h5 class="mt-5 mb-3">Submission history</h5>
    <p class="text-muted small mb-2" th:if="${submissionHistory == null or submissionHistory.isEmpty()}">No submissions yet.</p>
    <div class="list-group" th:if="${submissionHistory != null and !submissionHistory.isEmpty()}">
        <div class="list-group-item d-flex flex-column flex-md-row justify-content-between align-items-md-start gap-2"
             th:each="entry, iterStat : ${submissionHistory}"
             th:with="attemptNum=${#lists.size(submissionHistory) - iterStat.index}">
            <div class="flex-grow-1">
                <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                    <span class="fw-semibold" th:text="'Attempt ' + ${attemptNum}">Attempt 1</span>
                    <div th:replace="~{fragments/review-status-badge :: statusBadge(${entry.status})}"></div>
                </div>
                <div class="small text-muted"
                     th:text="${#temporals.format(entry.dateCreated, 'dd MMM yyyy HH:mm', T(java.util.Locale).ENGLISH)}">1 Jan 2026 12:00</div>
                <div class="small mt-1" th:if="${entry.mentorRemarks != null and !entry.mentorRemarks.isBlank()}">
                    <span class="text-muted">Mentor remarks:</span>
                    <span th:text="${entry.mentorRemarks}">—</span>
                </div>
                <div class="small mt-1 text-danger" th:if="${entry.status.name() == 'ERROR' and entry.errorMessage != null and !entry.errorMessage.isBlank()}">
                    <span class="text-muted">Error:</span>
                    <span th:text="${entry.errorMessage}">—</span>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
