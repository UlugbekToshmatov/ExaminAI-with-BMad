<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Review status</title></head>
<body>
<main id="main-content" layout:fragment="content">
    <h1 class="h4 mb-3">Review status</h1>
    <div th:replace="~{fragments/intern-status-card :: internStatusCard(${review}, ${submission})}"></div>
    <p class="mb-0">
        <a th:href="@{/intern/tasks}">Back to my tasks</a>
    </p>
</main>
<th:block layout:fragment="scripts">
    <script th:src="@{/js/review-polling.js}"></script>
</th:block>
</body>
</html>
