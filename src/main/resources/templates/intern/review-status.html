<!DOCTYPE html>

      layout:decorate="~{layout/base}">
<head><title>Review submitted</title></head>
<body>
<main id="main-content" layout:fragment="content">
    <h4 class="mb-3">Review submitted</h4>
    <p class="mb-0">Submitted. AI review in progress.</p>
    <p class="text-muted small mt-2 mb-0">
        Reference: <span th:text="${reviewId}">0</span>

    <p class="mt-3 mb-0">
        <a th:href="@{/intern/tasks}">Back to my tasks</a>
    </p>
</main>
</body>
</html>
