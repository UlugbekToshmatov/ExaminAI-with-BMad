<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>My Tasks</title></head>
<body>
<main id="main-content" layout:fragment="content">
    <h4>My Tasks</h4>

    <!-- Progress bar -->
    <div th:unless="${total == 0}" class="mb-3">
        <div class="d-flex justify-content-between mb-1">
            <span class="small text-muted">Progress</span>
            <span class="small text-muted" th:text="${progressPercent + '%'}">0%</span>
        </div>
        <div class="progress">
            <div class="progress-bar bg-success"
                 role="progressbar"
                 th:style="'width: ' + ${progressPercent} + '%'"
                 th:attr="aria-valuenow=${progressPercent}"
                 aria-valuemin="0" aria-valuemax="100"></div>
        </div>
    </div>

    <!-- Empty state -->
    <p th:if="${total == 0}" class="text-muted">No tasks have been assigned yet.</p>

    <!-- Card grid -->
    <div th:unless="${total == 0}" class="row g-3">
        <div th:each="twr : ${tasks}" class="col-md-4 col-6">
            <div th:replace="~{fragments/task-status-card :: taskStatusCard(${twr.task()}, ${twr.review()})}"></div>
        </div>
    </div>
</main>
</body>
</html>
