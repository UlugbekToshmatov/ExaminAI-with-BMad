<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Course Form</title></head>
<body>
<main id="main-content" layout:fragment="content">
    <h4 th:text="${courseId != null} ? 'Edit Course' : 'Create Course'">Course</h4>

    <form th:if="${courseId != null}"
          th:action="${baseCourseUrl + '/' + courseId + '/edit'}"
          th:object="${courseDto}" method="post" class="col-md-5">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3">
            <label for="courseName" class="form-label">Course Name</label>
            <input type="text" class="form-control" id="courseName" th:field="*{courseName}" required
                   th:classappend="${#fields.hasErrors('courseName')} ? 'is-invalid'">
            <div th:if="${#fields.hasErrors('courseName')}" class="invalid-feedback"
                 th:errors="*{courseName}"></div>
        </div>
        <div class="mb-3">
            <label for="technology" class="form-label">Technology</label>
            <input type="text" class="form-control" id="technology" th:field="*{technology}">
        </div>
        <div class="mb-3">
            <label for="stackId" class="form-label">Stack</label>
            <select class="form-select" id="stackId" th:field="*{stackId}" required
                    th:classappend="${#fields.hasErrors('stackId')} ? 'is-invalid'">
                <option value="" disabled th:selected="${courseDto.stackId == null}">Select stack</option>
                <option th:each="s : ${stacks}" th:value="${s.id}" th:text="${s.name}">Java</option>
            </select>
            <div th:if="${#fields.hasErrors('stackId')}" class="invalid-feedback" th:errors="*{stackId}"></div>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a th:href="${baseCourseUrl}" class="btn btn-link">Back to Courses</a>
    </form>

    <form th:unless="${courseId != null}"
          th:action="${baseCourseUrl}"
          th:object="${courseDto}" method="post" class="col-md-5">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3">
            <label for="courseName" class="form-label">Course Name</label>
            <input type="text" class="form-control" id="courseName" th:field="*{courseName}" required
                   th:classappend="${#fields.hasErrors('courseName')} ? 'is-invalid'">
            <div th:if="${#fields.hasErrors('courseName')}" class="invalid-feedback"
                 th:errors="*{courseName}"></div>
        </div>
        <div class="mb-3">
            <label for="technology" class="form-label">Technology</label>
            <input type="text" class="form-control" id="technology" th:field="*{technology}">
        </div>
        <div class="mb-3">
            <label for="stackId" class="form-label">Stack</label>
            <select class="form-select" id="stackId" th:field="*{stackId}" required
                    th:classappend="${#fields.hasErrors('stackId')} ? 'is-invalid'">
                <option value="" disabled th:selected="${courseDto.stackId == null}">Select stack</option>
                <option th:each="s : ${stacks}" th:value="${s.id}" th:text="${s.name}">Java</option>
            </select>
            <div th:if="${#fields.hasErrors('stackId')}" class="invalid-feedback" th:errors="*{stackId}"></div>
        </div>
        <button type="submit" class="btn btn-primary">Create Course</button>
        <a th:href="${baseCourseUrl}" class="btn btn-link">Back to Courses</a>
    </form>
</main>
</body>
</html>
