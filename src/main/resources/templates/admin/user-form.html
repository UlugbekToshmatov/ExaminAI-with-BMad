<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Create User</title></head>
<body>
<main id="main-content" layout:fragment="content">
    <h4>Create User Account</h4>

    <form th:action="@{/admin/users}" th:object="${createDto}" method="post" class="col-md-5">
        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" role="alert">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}" class="mb-0">Error</p>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" th:field="*{username}"
                   th:classappend="${#fields.hasErrors('username')} ? ' is-invalid'" required>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" th:field="*{email}">
        </div>
        <div class="mb-3">
            <label for="role" class="form-label">Role</label>
            <select class="form-select" id="role" th:field="*{role}"
                    th:classappend="${#fields.hasErrors('role')} ? ' is-invalid'" required>
                <option value="" disabled>Select role</option>
                <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Initial Password</label>
            <input type="password" class="form-control" id="password" th:field="*{password}"
                   th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'" required>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <div class="mb-3" th:if="${stacks != null}">
            <div class="form-label">Stacks</div>
            <p class="text-muted small">Required when role is Intern; ignored for other roles.</p>
            <div th:each="s : ${stacks}" class="form-check">
                <input class="form-check-input" type="checkbox" th:value="${s.id}" name="stackIds" th:id="${'stack' + s.id}"
                       th:checked="${createDto.stackIds != null and createDto.stackIds.contains(s.id)}">
                <label class="form-check-label" th:for="${'stack' + s.id}" th:text="${s.name}">Java</label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Create User</button>
        <a href="/admin/users" class="btn btn-link">Back to User List</a>
    </form>
</main>
</body>
</html>
