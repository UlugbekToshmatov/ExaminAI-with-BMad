<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Stack form</title></head>
<body>
<main id="main-content" layout:fragment="content">
    <h4 th:text="${stackId != null} ? 'Edit stack' : 'Create stack'">Stack</h4>

    <form th:if="${stackId != null}"
          th:action="@{/admin/stacks/{id}/edit(id=${stackId})}"
          th:object="${stackDto}" method="post" class="col-md-5">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" role="alert">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}" class="mb-0">Error</p>
        </div>
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" th:field="*{name}" required maxlength="100"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
            <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback" th:errors="*{name}"></div>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
        <a th:href="@{/admin/stacks}" class="btn btn-link">Back to stacks</a>
    </form>

    <form th:unless="${stackId != null}"
          th:action="@{/admin/stacks}" th:object="${stackDto}" method="post" class="col-md-5">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" role="alert">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}" class="mb-0">Error</p>
        </div>
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" th:field="*{name}" required maxlength="100"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
            <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback" th:errors="*{name}"></div>
        </div>
        <button type="submit" class="btn btn-primary">Create</button>
        <a th:href="@{/admin/stacks}" class="btn btn-link">Back to stacks</a>
    </form>
</main>
</body>
</html>
