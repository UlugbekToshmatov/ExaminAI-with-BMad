<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - ExaminAI">ExaminAI</title>
    <!-- CSRF meta tag for JS fetch requests -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <!-- Bootstrap 5 via WebJar -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
    <!-- Accessibility: skip link -->
    <a href="#main-content" class="visually-hidden-focusable">Skip to content</a>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/}">ExaminAI</a>
            <ul class="navbar-nav flex-row flex-wrap gap-2 align-items-center me-auto mb-2 mb-lg-0 small"
                sec:authorize="isAuthenticated()">
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link py-1" th:href="@{/admin/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link py-1" th:href="@{/admin/users}">Users</a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MENTOR')">
                    <a class="nav-link py-1" th:href="@{/mentor/reviews}">Reviews</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link py-1" th:href="@{/admin/stacks}">Stacks</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link py-1" th:href="@{/admin/courses}">Courses</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link py-1" th:href="@{/admin/tasks}">Tasks</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('MENTOR')">
                    <a class="nav-link py-1" th:href="@{/mentor/courses}">Courses</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('MENTOR')">
                    <a class="nav-link py-1" th:href="@{/mentor/tasks}">Tasks</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('INTERN')">
                    <a class="nav-link py-1" th:href="@{/intern/tasks}">My tasks</a>
                </li>
            </ul>
            <div class="navbar-nav ms-auto d-flex flex-row align-items-center gap-3"
                 sec:authorize="isAuthenticated()">
                <!-- Role badge -->
                <span class="badge bg-secondary text-uppercase"
                      th:text="${#strings.replace(#authentication.authorities[0].authority, 'ROLE_', '')}">
                    ROLE
                </span>
                <!-- Username -->
                <span class="text-white" sec:authentication="name">Username</span>
                <!-- Logout -->
                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <main id="main-content" class="container py-4" style="max-width: 960px;">
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div layout:fragment="content">
            <!-- Page content inserted here by Thymeleaf Layout Dialect -->
        </div>
    </main>

    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
