spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
      chat:
        options:
          model: deepseek-r1:8b
      init:
        pull-model-strategy: never

# HTTP client for Spring AI → Ollama (/api/chat). Default 15m suits CPU-only + reasoning models + large diffs.
examinai:
  ai:
    ollama-read-timeout-ms: ${EXAMINAI_OLLAMA_READ_TIMEOUT_MS:900000}
    ollama-connect-timeout-ms: ${EXAMINAI_OLLAMA_CONNECT_TIMEOUT_MS:10000}

github:
  token: ${GITHUB_TOKEN:}

server:
  servlet:
    session:
      timeout: 1h

management:
  endpoints:
    web:
      exposure:
        include: health
