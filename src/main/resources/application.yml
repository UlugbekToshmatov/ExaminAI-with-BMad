spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}

server:
  servlet:
    session:
      timeout: 1h

management:
  endpoints:
    web:
      exposure:
        include: health
