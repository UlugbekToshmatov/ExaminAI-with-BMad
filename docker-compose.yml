# Stack: postgres, ollama, app — all config/secrets via .env (env_file); do not add secrets here.
# Run from repo root:
#   docker compose up -d          — routine restarts (reuse built images; no registry pull if tags unchanged)
#   docker compose up -d --build  — only after Dockerfile / pom / app deps / base image tag bumps
# Pin image tags below and bump deliberately to avoid surprise layer churn and re-pulls.

name: examinai

services:
  postgres:
    image: postgres:16.13
    pull_policy: missing
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: examinai
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USERNAME} -d $${POSTGRES_DB} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Ollama: first `docker compose up` pulls `qwen2.5-coder:3b` (default review model; smaller/faster on CPU than 8B reasoning models).
  # Health `start_period` / `retries` are relaxed for slow links; entrypoint is unchanged (code review D1, option 1).
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    image: examinai-ollama:local
    pull_policy: never
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5-coder:3b && wait"]
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 20
      start_period: 1200s

  app:
    build: .
    image: examinai-app:local
    pull_policy: never
    env_file: .env
    # Must use the Compose service name. A .env meant for host-side dev often sets
    # OLLAMA_BASE_URL=http://localhost:11434, which breaks inside this container.
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s

volumes:
  db-data:
  ollama-models:
